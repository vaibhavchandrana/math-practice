<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Math Practice - Speed Training</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0c10;
  --surface: #13151c;
  --surface-2: #1b1e28;
  --surface-3: #232734;
  --border: rgba(255,255,255,0.06);
  --border-hover: rgba(255,255,255,0.12);
  --text: #e8e8f0;
  --text-2: #8e8fa0;
  --text-3: #505168;
  --cyan: #22d3a8;
  --cyan-dim: rgba(34,211,168,0.1);
  --amber: #f5a623;
  --amber-dim: rgba(245,166,35,0.1);
  --indigo: #6366f1;
  --indigo-dim: rgba(99,102,241,0.1);
  --green: #34d399;
  --green-dim: rgba(52,211,153,0.12);
  --red: #ef4444;
  --red-dim: rgba(239,68,68,0.12);
  --pink: #ec4899;
  --pink-dim: rgba(236,72,153,0.1);
  --violet: #a78bfa;
  --violet-dim: rgba(167,139,250,0.1);
  --sky: #38bdf8;
  --sky-dim: rgba(56,189,248,0.1);
  --radius: 16px;
  --radius-sm: 10px;
  --radius-xs: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Outfit', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/%3E%3C/svg%3E");
  opacity: 0.025;
  pointer-events: none;
  z-index: 9999;
}
body::after {
  content: '';
  position: fixed;
  top: -40%;
  left: 50%;
  transform: translateX(-50%);
  width: 140%;
  height: 60%;
  background: radial-gradient(ellipse, rgba(34,211,168,0.04) 0%, transparent 70%);
  pointer-events: none;
}
#app {
  max-width: 520px;
  margin: 0 auto;
  padding: 0 16px 100px;
  position: relative;
  z-index: 1;
}
.header {
  text-align: center;
  padding: 32px 0 24px;
}
.header h1 {
  font-family: 'Instrument Serif', serif;
  font-size: 2.4rem;
  font-weight: 400;
  color: var(--cyan);
  letter-spacing: -0.5px;
  line-height: 1.1;
}
.header p {
  color: var(--text-3);
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 6px;
}
.tab-bar {
  display: flex;
  background: var(--surface);
  border-radius: 14px;
  padding: 4px;
  margin-bottom: 28px;
  border: 1px solid var(--border);
  position: sticky;
  top: 8px;
  z-index: 100;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}
.tab-btn {
  flex: 1;
  padding: 12px 0;
  font-family: 'Outfit', sans-serif;
  font-size: 0.85rem;
  font-weight: 700;
  border: none;
  border-radius: 11px;
  background: transparent;
  color: var(--text-3);
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.25,0.46,0.45,0.94);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.tab-btn.active {
  background: var(--cyan);
  color: var(--bg);
  box-shadow: 0 4px 20px rgba(34,211,168,0.25);
}
.tab-btn:not(.active):hover { color: var(--text-2); }
.section-label {
  font-size: 0.65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: var(--text-3);
  margin-bottom: 14px;
  padding-left: 4px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(to right, var(--border), transparent);
}
.topics-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 24px;
}
.topic-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding: 22px 12px 18px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.25,0.46,0.45,0.94);
  text-align: center;
  position: relative;
  overflow: hidden;
  font-family: 'Outfit', sans-serif;
}
.topic-card::before {
  content: '';
  position: absolute;
  top: 0; left: 20%; right: 20%;
  height: 2px;
  border-radius: 0 0 4px 4px;
  opacity: 0;
  transition: all 0.3s;
}
.topic-card:hover {
  background: var(--surface-2);
  border-color: var(--border-hover);
  transform: translateY(-2px);
}
.topic-card:hover::before { opacity: 1; left: 10%; right: 10%; }
.topic-card:active { transform: translateY(0) scale(0.97); }
.topic-card .tc-icon {
  width: 46px; height: 46px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 13px;
  font-size: 1.3rem;
  font-weight: 700;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.04);
  transition: transform 0.3s;
}
.topic-card:hover .tc-icon { transform: scale(1.08); }
.topic-card .tc-label { font-size: 0.8rem; font-weight: 700; color: var(--text); line-height: 1.2; }
.topic-card .tc-sub { font-size: 0.65rem; font-weight: 500; color: var(--text-3); }
.topic-card[data-color="cyan"]::before { background: var(--cyan); }
.topic-card[data-color="cyan"] .tc-icon { color: var(--cyan); }
.topic-card[data-color="amber"]::before { background: var(--amber); }
.topic-card[data-color="amber"] .tc-icon { color: var(--amber); }
.topic-card[data-color="pink"]::before { background: var(--pink); }
.topic-card[data-color="pink"] .tc-icon { color: var(--pink); }
.topic-card[data-color="indigo"]::before { background: var(--indigo); }
.topic-card[data-color="indigo"] .tc-icon { color: var(--indigo); }
.topic-card[data-color="green"]::before { background: var(--green); }
.topic-card[data-color="green"] .tc-icon { color: var(--green); }
.topic-card[data-color="violet"]::before { background: var(--violet); }
.topic-card[data-color="violet"] .tc-icon { color: var(--violet); }
.topic-card[data-color="sky"]::before { background: var(--sky); }
.topic-card[data-color="sky"] .tc-icon { color: var(--sky); }
.detail-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 20px;
  padding: 20px 0 0;
}
.detail-header h2 {
  font-family: 'Instrument Serif', serif;
  font-size: 1.6rem;
  font-weight: 400;
  color: var(--text);
  flex: 1;
}
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 18px;
  font-family: 'Outfit', sans-serif;
  font-size: 0.75rem;
  font-weight: 600;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text-2);
  cursor: pointer;
  transition: all 0.25s;
  letter-spacing: 0.5px;
  flex-shrink: 0;
}
.back-btn:hover {
  border-color: var(--cyan);
  color: var(--cyan);
  background: var(--cyan-dim);
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 14px;
}
.card h3 {
  font-family: 'Instrument Serif', serif;
  font-size: 1.1rem;
  font-weight: 400;
  color: var(--text);
  margin-bottom: 16px;
}
.data-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 0.82rem;
}
.data-table th {
  background: rgba(255,255,255,0.025);
  color: var(--cyan);
  padding: 10px 12px;
  text-align: center;
  font-weight: 700;
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  border-bottom: 1px solid var(--border);
}
.data-table th:first-child { border-radius: var(--radius-xs) 0 0 0; }
.data-table th:last-child { border-radius: 0 var(--radius-xs) 0 0; }
.data-table td {
  padding: 9px 12px;
  text-align: center;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  color: var(--text-2);
  font-weight: 500;
  transition: background 0.2s;
}
.data-table tr:hover td { background: rgba(34,211,168,0.03); }
.data-table .col-key { font-weight: 700; color: var(--text); }
.data-table .col-val { color: var(--cyan); font-weight: 600; }
.data-table .col-val-2 { color: var(--amber); font-weight: 600; }
.data-table .col-val-3 { color: var(--pink); font-weight: 600; }
.pagination {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 14px;
  margin: 18px 0;
}
.pagination button {
  padding: 10px 24px;
  font-family: 'Outfit', sans-serif;
  font-size: 0.75rem;
  font-weight: 700;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  transition: all 0.25s;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.pagination button:hover:not(:disabled) { border-color: var(--cyan); color: var(--cyan); }
.pagination button:disabled { opacity: 0.25; cursor: default; }
.pagination .pg-info { font-size: 0.75rem; color: var(--text-3); font-weight: 600; }
.converter-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}
.converter-row input {
  flex: 1;
  padding: 14px;
  font-size: 1.1rem;
  font-weight: 600;
  font-family: 'Outfit', sans-serif;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: rgba(0,0,0,0.3);
  color: var(--text);
  text-align: center;
  transition: all 0.25s;
}
.converter-row input:focus {
  outline: none;
  border-color: var(--cyan);
  box-shadow: 0 0 0 3px var(--cyan-dim);
}
.converter-row .arrow { color: var(--cyan); font-weight: 700; opacity: 0.5; }
.converter-row .result-box {
  flex: 1;
  padding: 14px;
  font-size: 1.1rem;
  font-weight: 700;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: rgba(0,0,0,0.3);
  color: var(--cyan);
  text-align: center;
  min-height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.conv-label {
  font-size: 0.65rem;
  color: var(--text-3);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 8px;
}
.conv-formula {
  font-size: 0.72rem;
  color: var(--text-3);
  margin-top: 6px;
  font-style: italic;
}
.quiz-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 18px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 20px;
  font-size: 0.82rem;
  color: var(--text-2);
}
.quiz-bar .qb-stat { display: flex; align-items: center; gap: 5px; }
.quiz-bar strong { color: var(--text); font-size: 1.05rem; }
.quiz-bar .qb-streak { color: var(--amber); }
@keyframes fireGlow {
  0%,100% { text-shadow: 0 0 6px rgba(245,166,35,0.3); }
  50% { text-shadow: 0 0 14px rgba(245,166,35,0.6); }
}
.quiz-bar .qb-streak.on-fire { animation: fireGlow 1s ease infinite; }
.quiz-question {
  text-align: center;
  font-family: 'Instrument Serif', serif;
  font-size: 2.4rem;
  font-weight: 400;
  padding: 36px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  margin-bottom: 20px;
  color: var(--text);
  line-height: 1.3;
}
.quiz-question .qq-hint {
  display: block;
  font-family: 'Outfit', sans-serif;
  font-size: 0.72rem;
  color: var(--text-3);
  margin-top: 8px;
  font-weight: 500;
  letter-spacing: 0.5px;
}
.quiz-input {
  width: 100%;
  padding: 18px 20px;
  font-family: 'Outfit', sans-serif;
  font-size: 1.4rem;
  font-weight: 700;
  text-align: center;
  border: 2px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--text);
  transition: all 0.3s;
  letter-spacing: 1px;
  margin-bottom: 18px;
}
.quiz-input:focus {
  outline: none;
  border-color: var(--cyan);
  box-shadow: 0 0 0 4px var(--cyan-dim);
}
.quiz-input.correct {
  border-color: var(--green);
  box-shadow: 0 0 0 4px var(--green-dim);
  color: var(--green);
}
.quiz-input.wrong {
  border-color: var(--red);
  box-shadow: 0 0 0 4px var(--red-dim);
  color: var(--red);
}
.quiz-actions { display: flex; gap: 10px; }
.quiz-btn {
  flex: 1;
  padding: 16px 20px;
  font-family: 'Outfit', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.25,0.46,0.45,0.94);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.quiz-btn:active { transform: scale(0.96); }
.btn-check {
  background: var(--cyan);
  color: var(--bg);
}
.btn-check:hover { box-shadow: 0 6px 24px rgba(34,211,168,0.3); transform: translateY(-1px); }
.btn-check:disabled { opacity: 0.3; cursor: default; transform: none; box-shadow: none; }
.btn-next {
  background: var(--surface-2);
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-next:hover { border-color: var(--border-hover); background: var(--surface-3); }
.quiz-feedback {
  text-align: center;
  padding: 16px;
  border-radius: var(--radius);
  margin-bottom: 16px;
  font-weight: 700;
  font-size: 0.9rem;
}
.quiz-feedback.fb-correct {
  background: var(--green-dim);
  color: var(--green);
  border: 1px solid rgba(52,211,153,0.2);
}
.quiz-feedback.fb-wrong {
  background: var(--red-dim);
  color: var(--red);
  border: 1px solid rgba(239,68,68,0.2);
}
.quiz-feedback .fb-answer {
  display: block;
  margin-top: 6px;
  font-size: 1.1rem;
  color: var(--green);
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.anim-up {
  opacity: 0;
  animation: fadeUp 0.45s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
}
.stagger-1 { animation-delay: 0.03s; }
.stagger-2 { animation-delay: 0.06s; }
.stagger-3 { animation-delay: 0.09s; }
.stagger-4 { animation-delay: 0.12s; }
.stagger-5 { animation-delay: 0.15s; }
.stagger-6 { animation-delay: 0.18s; }
.stagger-7 { animation-delay: 0.21s; }
@keyframes wrongShake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-5px); }
  40% { transform: translateX(5px); }
  60% { transform: translateX(-3px); }
  80% { transform: translateX(3px); }
}
.shake { animation: wrongShake 0.4s ease; }
@keyframes correctPulse {
  0% { box-shadow: 0 0 0 0 rgba(52,211,153,0.4); }
  70% { box-shadow: 0 0 0 12px rgba(52,211,153,0); }
  100% { box-shadow: 0 0 0 0 rgba(52,211,153,0); }
}
.pulse-green { animation: correctPulse 0.5s ease; }
.hidden { display: none !important; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
@media (max-width: 380px) {
  .topics-grid { grid-template-columns: 1fr; }
  .quiz-question { font-size: 1.8rem; padding: 28px 16px; }
  .header h1 { font-size: 2rem; }
}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>Math Practice</h1>
    <p>Speed Training</p>
  </div>
  <div class="tab-bar" id="tab-bar">
    <button class="tab-btn active" id="tab-learn">Learn</button>
    <button class="tab-btn" id="tab-practice">Practice</button>
  </div>
  <div id="content"></div>
</div>

<script>
// ══════════════════════════ STATE ══════════════════════════
var currentTab = 'learn';
var currentView = 'home';
var currentTopic = null;
var quiz = { score: 0, total: 0, streak: 0, answered: false, currentQ: null };
var tablePage = 0;
var TABLES_PER_PAGE = 3;
var TOTAL_TABLE_PAGES = Math.ceil(30 / TABLES_PER_PAGE);

// ══════════════════════════ DATA ══════════════════════════
function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }

function generateFractions() {
  var fracs = [];
  for (var d = 2; d <= 25; d++) {
    for (var n = 1; n < d; n++) {
      if (gcd(n, d) === 1) {
        var pct = (n / d) * 100;
        var rounded = Math.round(pct * 100) / 100;
        fracs.push({ n: n, d: d, pct: rounded });
      }
    }
  }
  return fracs;
}
var ALL_FRACTIONS = generateFractions();

var TOPICS = [
  { id: 'tables', label: 'Tables', sub: '1 - 30', icon: '\u00d7', color: 'cyan' },
  { id: 'squares', label: 'Squares', sub: '1 - 50', icon: 'n\u00b2', color: 'amber' },
  { id: 'cubes', label: 'Cubes', sub: '1 - 30', icon: 'n\u00b3', color: 'pink' },
  { id: 'consec', label: 'Consecutive \u00d7', sub: '11 to 25', icon: 'n\u00b7m', color: 'indigo' },
  { id: 'fractions', label: 'Fraction \u2194 %', sub: '1/2 to 1/25', icon: '%', color: 'green' },
  { id: 'alphabet', label: 'Alphabet Index', sub: 'A-Z + Reverse', icon: 'AZ', color: 'violet' },
  { id: 'degree', label: 'Degree \u2194 %', sub: 'Converter', icon: '\u00b0', color: 'sky' }
];

// ══════════════════════════ NAVIGATION ══════════════════════════
document.getElementById('tab-learn').addEventListener('click', function() { switchTab('learn'); });
document.getElementById('tab-practice').addEventListener('click', function() { switchTab('practice'); });

function switchTab(tab) {
  currentTab = tab;
  currentView = 'home';
  currentTopic = null;
  tablePage = 0;
  document.getElementById('tab-learn').classList.toggle('active', tab === 'learn');
  document.getElementById('tab-practice').classList.toggle('active', tab === 'practice');
  render();
}

function showDetail(topicId) {
  currentView = 'detail';
  currentTopic = topicId;
  tablePage = 0;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function startQuiz(topicId) {
  currentView = 'quiz';
  currentTopic = topicId;
  quiz = { score: 0, total: 0, streak: 0, answered: false, currentQ: null };
  render();
  generateNewQuestion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goHome() {
  currentView = 'home';
  currentTopic = null;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ══════════════════════════ RENDER ══════════════════════════
function getContent() { return document.getElementById('content'); }

function render() {
  if (currentView === 'home') renderHome();
  else if (currentView === 'detail') renderDetail();
  else if (currentView === 'quiz') renderQuizScreen();
}

function renderHome() {
  var el = getContent();
  var isLearn = currentTab === 'learn';
  var label = isLearn ? 'Reference Material' : 'Test Yourself';

  // Build DOM safely
  el.textContent = '';

  var sectionLabel = document.createElement('div');
  sectionLabel.className = 'section-label';
  sectionLabel.textContent = label;
  el.appendChild(sectionLabel);

  var grid = document.createElement('div');
  grid.className = 'topics-grid';

  TOPICS.forEach(function(t, i) {
    var card = document.createElement('div');
    card.className = 'topic-card anim-up stagger-' + (i + 1);
    card.setAttribute('data-color', t.color);

    if (isLearn) {
      card.addEventListener('click', (function(id) { return function() { showDetail(id); }; })(t.id));
    } else {
      card.addEventListener('click', (function(id) { return function() { startQuiz(id); }; })(t.id));
    }

    var icon = document.createElement('div');
    icon.className = 'tc-icon';
    icon.textContent = t.icon;

    var lbl = document.createElement('div');
    lbl.className = 'tc-label';
    lbl.textContent = t.label;

    var sub = document.createElement('div');
    sub.className = 'tc-sub';
    sub.textContent = t.sub;

    card.appendChild(icon);
    card.appendChild(lbl);
    card.appendChild(sub);
    grid.appendChild(card);
  });

  el.appendChild(grid);
}

function createPagination(parent) {
  var pg = document.createElement('div');
  pg.className = 'pagination';

  var prevBtn = document.createElement('button');
  prevBtn.textContent = '\u2190 Prev';
  prevBtn.disabled = (tablePage === 0);
  prevBtn.addEventListener('click', function() {
    if (tablePage > 0) { tablePage--; renderDetail(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
  });

  var info = document.createElement('span');
  info.className = 'pg-info';
  info.textContent = 'Page ' + (tablePage + 1) + ' / ' + TOTAL_TABLE_PAGES;

  var nextBtn = document.createElement('button');
  nextBtn.textContent = 'Next \u2192';
  nextBtn.disabled = (tablePage >= TOTAL_TABLE_PAGES - 1);
  nextBtn.addEventListener('click', function() {
    if (tablePage < TOTAL_TABLE_PAGES - 1) { tablePage++; renderDetail(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
  });

  pg.appendChild(prevBtn);
  pg.appendChild(info);
  pg.appendChild(nextBtn);
  parent.appendChild(pg);
}

function rand(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function generateNewQuestion() {
  quiz.answered = false;
  var q;

  switch (currentTopic) {
    case 'tables':
      var tn = rand(1, 30), tm = rand(2, 10);
      q = { text: tn + ' \u00d7 ' + tm + ' = ?', answer: String(tn * tm), hint: 'Type the number' };
      break;
    case 'squares':
      var sn = rand(1, 50);
      q = { text: sn + '\u00b2 = ?', answer: String(sn * sn), hint: 'Type the square' };
      break;
    case 'cubes':
      var cn = rand(1, 30);
      q = { text: cn + '\u00b3 = ?', answer: String(cn * cn * cn), hint: 'Type the cube' };
      break;
    case 'consec':
      var xn = rand(11, 24);
      q = { text: xn + ' \u00d7 ' + (xn + 1) + ' = ?', answer: String(xn * (xn + 1)), hint: 'Type the product' };
      break;
    case 'fractions':
      var f = ALL_FRACTIONS[rand(0, ALL_FRACTIONS.length - 1)];
      if (Math.random() < 0.5) {
        var pctStr = f.pct % 1 === 0 ? String(f.pct) : f.pct.toFixed(2);
        q = { text: f.n + '/' + f.d + ' = ? %', answer: pctStr, hint: 'Type percentage (e.g. 12.5)' };
      } else {
        var pctLabel = f.pct % 1 === 0 ? f.pct + '%' : f.pct.toFixed(2) + '%';
        q = { text: pctLabel + ' = ?', answer: f.n + '/' + f.d, hint: 'Type fraction (e.g. 1/8)' };
      }
      break;
    case 'alphabet':
      var ai = rand(1, 26);
      var ach = String.fromCharCode(64 + ai);
      var arev = String.fromCharCode(64 + (27 - ai));
      var atype = rand(0, 2);
      if (atype === 0) {
        q = { text: 'Position of  ' + ach + '  ?', answer: String(ai), hint: 'Type the number (1-26)' };
      } else if (atype === 1) {
        q = { text: 'Reverse of  ' + ach + '  ?', answer: arev, hint: 'Type the letter' };
      } else {
        q = { text: 'Letter at position  ' + ai + '  ?', answer: ach, hint: 'Type the letter' };
      }
      break;
    case 'degree':
      var degs = [36,45,60,72,90,108,120,144,180,216,240,252,270,288,324,360];
      var pcts = [10,12.5,16.67,20,25,30,33.33,40,50,60,66.67,70,75,80,90,100];
      if (Math.random() < 0.5) {
        var di = rand(0, pcts.length - 1);
        var dp = pcts[di];
        var dd = degs[di];
        q = { text: (dp % 1 === 0 ? dp + '%' : dp.toFixed(2) + '%') + ' = ? \u00b0', answer: String(dd), hint: 'Type degrees' };
      } else {
        var di2 = rand(0, degs.length - 1);
        var dd2 = degs[di2];
        var dp2 = pcts[di2];
        var dpStr = dp2 % 1 === 0 ? String(dp2) : dp2.toFixed(2);
        q = { text: dd2 + '\u00b0 = ? %', answer: dpStr, hint: 'Type percentage' };
      }
      break;
  }

  quiz.currentQ = q;
  updateQuizDisplay();
}

function updateQuizDisplay() {
  var q = quiz.currentQ;
  if (!q) return;

  var textEl = document.getElementById('q-text');
  if (textEl) {
    textEl.textContent = '';
    textEl.appendChild(document.createTextNode(q.text));
    var hintSpan = document.createElement('span');
    hintSpan.className = 'qq-hint';
    hintSpan.textContent = q.hint;
    textEl.appendChild(hintSpan);
  }

  var inputEl = document.getElementById('q-input');
  if (inputEl) {
    inputEl.value = '';
    inputEl.className = 'quiz-input';
    inputEl.disabled = false;
    inputEl.focus();
    inputEl.inputMode = (q.hint.indexOf('letter') !== -1 || q.hint.indexOf('fraction') !== -1) ? 'text' : 'decimal';
  }

  var fb = document.getElementById('q-feedback');
  if (fb) fb.textContent = '';

  var actions = document.getElementById('q-actions');
  if (actions) {
    actions.textContent = '';
    var checkBtn = document.createElement('button');
    checkBtn.className = 'quiz-btn btn-check';
    checkBtn.textContent = 'Check';
    checkBtn.addEventListener('click', checkAnswer);
    actions.appendChild(checkBtn);
  }

  updateScoreDisplay();
}

function checkAnswer() {
  if (quiz.answered || !quiz.currentQ) return;

  var inputEl = document.getElementById('q-input');
  var userAnswer = inputEl.value.trim();
  if (!userAnswer) return;

  quiz.answered = true;
  quiz.total++;

  var correctAnswer = quiz.currentQ.answer;
  var isCorrect = normalizeAnswer(userAnswer) === normalizeAnswer(correctAnswer);

  // Numeric tolerance for decimal answers
  if (!isCorrect) {
    var userNum = parseFloat(userAnswer);
    var correctNum = parseFloat(correctAnswer);
    if (!isNaN(userNum) && !isNaN(correctNum) && Math.abs(userNum - correctNum) < 0.02) {
      isCorrect = true;
    }
  }

  if (isCorrect) {
    quiz.score++;
    quiz.streak++;
    inputEl.className = 'quiz-input correct pulse-green';
  } else {
    quiz.streak = 0;
    inputEl.className = 'quiz-input wrong shake';
  }

  inputEl.disabled = true;
  updateScoreDisplay();

  // Feedback
  var fb = document.getElementById('q-feedback');
  fb.textContent = '';
  var fbDiv = document.createElement('div');
  fbDiv.className = 'quiz-feedback anim-up ' + (isCorrect ? 'fb-correct' : 'fb-wrong');

  if (isCorrect) {
    fbDiv.textContent = 'Correct!';
  } else {
    fbDiv.appendChild(document.createTextNode('Wrong!'));
    var ansSpan = document.createElement('span');
    ansSpan.className = 'fb-answer';
    ansSpan.textContent = 'Correct answer: ' + correctAnswer;
    fbDiv.appendChild(ansSpan);
  }
  fb.appendChild(fbDiv);

  // Next button
  var actions = document.getElementById('q-actions');
  actions.textContent = '';
  var nextBtn = document.createElement('button');
  nextBtn.className = 'quiz-btn btn-next';
  nextBtn.textContent = 'Next Question \u2192';
  nextBtn.addEventListener('click', nextQuizQuestion);
  actions.appendChild(nextBtn);
}

function nextQuizQuestion() {
  generateNewQuestion();
}

function normalizeAnswer(s) {
  return s.toLowerCase().replace(/\s+/g, '').replace(/^0+(\d)/, '$1');
}

function updateScoreDisplay() {
  var scoreEl = document.getElementById('q-score');
  var totalEl = document.getElementById('q-total');
  var streakEl = document.getElementById('q-streak');
  var streakWrap = document.getElementById('q-streak-wrap');
  if (scoreEl) scoreEl.textContent = quiz.score;
  if (totalEl) totalEl.textContent = quiz.total;
  if (streakEl) streakEl.textContent = quiz.streak;
  if (streakWrap) {
    if (quiz.streak >= 3) streakWrap.classList.add('on-fire');
    else streakWrap.classList.remove('on-fire');
  }
}

// ══════════════════════════ INIT ══════════════════════════
render();
</script>
</body>
</html>
